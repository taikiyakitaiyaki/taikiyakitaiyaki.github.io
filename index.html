<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Praksissøknad</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid #eee;
}

header h1 {
    font-size: 20px;
    margin: 0;
}

header a {
    text-decoration: none;
    color: white;
    background: #0077b5;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
}

/* MAIN */
.container {
    max-width: 800px;
    margin: 60px auto;
    padding: 0 20px;
}

h2 {
    margin-top: 40px;
}

p {
    line-height: 1.6;
    color: #444;
}

/* BUTTON */
.button {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 16px;
    background: #0077b5;
    color: white;
    text-decoration: none;
    border-radius: 6px;
}

/* SKILLS */
.skills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

.skill {
    background: #f3f4f6;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 14px;
}

/* VIDEO */
iframe {
    margin-top: 15px;
    width: 100%;
    height: 360px;
    border-radius: 8px;
    border: none;
}

/* FOOTER */
footer {
    margin-top: 80px;
    padding: 30px;
    text-align: center;
    border-top: 1px solid #eee;
    color: #555;
    font-size: 14px;
}
</style>

</head>

<body>

<header>
    <h1>My Trinh Hoang</h1>
    <a href="https://www.linkedin.com/in/my-t-hoang-2bb246385/" target="_blank">
        LinkedIn
    </a>
</header>

<div class="container">

    <h2>Om meg</h2>
    <p>
        Hei! Jeg er IT-student ved UiA og søker praksis gjennom IS-302.
        Jeg har interesse for systemutvikling og ønsker å utvikle mine ferdigheter gjennom reelle prosjekter.
    </p>

    <h2>Presentasjonsvideo</h2>
    <iframe src="https://www.youtube.com/embed/DIN_VIDEO"></iframe>

    <h2>Ferdigheter</h2>
    <div class="skills">
        <div class="skill">C#</div>
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">Git</div>
    </div>

</div>

<footer>
    <p>📧 trinhmh@uia.no</p>
</footer>

</body>
</html>
